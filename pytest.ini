[pytest]
# Pytest configuration for Web Vulnerability Scanner

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Markers for test categorization
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    scope: marks tests related to scope checking
    orchestrator: marks tests related to orchestrator engine
    concurrency: marks tests related to concurrency control
    error_handling: marks tests related to error handling
    integration: marks tests as integration tests

# Coverage options (for pytest-cov)
addopts = 
    -v
    --tb=short
    --strict-markers

# Test output options
console_output_style = progress
